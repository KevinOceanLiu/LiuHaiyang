    <nav class="navbar">
        <div class="nav-links">

    <div class="others-container">
        <div class="grid-container">
            <div class="grid-item ocean-station">
                <div class="grid-content">
                    <div class="grid-icon">
                        <svg viewBox="0 0 24 24" class="geometric-icon square">
                            <rect x="2" y="2" width="20" height="20" rx="4" fill="#007AFF"/>
                        </svg>
                    </div>
                    <h2>OceanStation</h2>
                    <p>Welcome to follow my WeChat public account: OceanStation. You know, we all have a desire to express ourselves.</p>
                    <div class="grid-footer">
                        <a href="oceanstation.html" class="explore-btn">Explore →</a>
                    </div>
                </div>
            </div>
            
            <div class="grid-item book-list">
                <div class="grid-content">
                    <div class="grid-icon">
                        <svg viewBox="0 0 24 24" class="geometric-icon triangle">
                            <path d="M12 2L22 20H2L12 2Z" fill="#FF3B30"/>
                        </svg>
                    </div>
                    <h2>BookList</h2>
                    <p>Books that shaped my thinking and journey.</p>
                    <div class="grid-footer">
                        <a href="booklist.html" class="explore-btn">Explore →</a>
                    </div>
                </div>
            </div>
            
            <div class="grid-item design">
                <div class="grid-content">
                    <div class="grid-icon">
                        <svg viewBox="0 0 24 24" class="geometric-icon circle">
                            <circle cx="12" cy="12" r="10" fill="#34C759"/>
                        </svg>
                    </div>
                    <h2>Design</h2>
                    <p>Creative works and design experiments.</p>
                    <div class="grid-footer">
                        <a href="#" class="explore-btn">Explore →</a>

                </div>
            </div>
        </div>
    </div>

    <div class="glass-card">
        <div class="visitor-count">
            <svg class="visitor-icon" viewBox="0 0 24 24" width="16" height="16">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v1c0 .55.45 1 1 1h14c.55 0 1-.45 1-1v-1c0-2.66-5.33-4-8-4z" fill="currentColor"/>
            </svg>
            <span class="visitor-label">UV:</span>
            <span id="busuanzi_value_site_uv"></span>
            <span class="visitor-label" style="margin-left: 10px;">PV:</span>
            <span id="busuanzi_value_site_pv"></span>
        </div>
    </div>

    <!-- 不蒜子计数脚本 -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

    <style>
        .glass-card {
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-radius: 16px;
            padding: 12px 20px;
            margin: 32px auto;
            max-width: 200px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.1);
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .visitor-count {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .visitor-icon {
            color: #007AFF;
        }

        #visitorCount {
            font-weight: 500;
            color: #007AFF;
        }

        .visitor-count img {
            height: 20px;
        }

        .visitor-label {
            color: rgba(0, 0, 0, 0.8);
            font-weight: 400;
        }
    </style>
